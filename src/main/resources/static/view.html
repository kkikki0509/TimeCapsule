<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>TimeCapusle</title>
        <link rel="stylesheet" href="/view.css" />
    </head>
    <body>
        <div id="layout">
            <!-- header -->
            <header id="header">
                <div id="logo">
                    <p>TimeCapsule</p>
                </div>
                
                <div id="v_title">
                    <input class="v_title" placeholder="제목" maxlength="25"></input>
                </div>
                <div id = "v_name">
                    <input class="v_name" placeholder="작성자" maxlength="10"></input>
                </div>
                
            </header>

            <!-- main -->
            <main id="main">
                <div>
                    <textarea id = "v_write" placeholder="추억하고 싶은 일을 적어주세요."></textarea>
                </div>
            </main>

            <!-- footer -->
            <footer id="footer">
                <input id="v_pw" placeholder="비밀번호" maxlength="4"></input>
                <a id="back" href="/main.html">목록</a>
            </footer>
        </div>
        <script type="module" src="/view.js"></script>
    </body>
</html>
